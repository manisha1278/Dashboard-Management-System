<h2 mat-dialog-title>

    Assign Dashboards

</h2>

<mat-dialog-content>

    @for(dashboard of data.dashboards; track dashboard.dashboardId){

        <mat-checkbox

            [checked]="isSelected(dashboard.dashboardId)"

            (change)="toggle(dashboard.dashboardId,$event.checked)">

            {{ dashboard.dashboardName }}

        </mat-checkbox>

        <br>

    }

</mat-dialog-content>

<mat-dialog-actions align="end">

<button
    mat-button
    (click)="cancel()">

    Cancel

</button>

<button
    mat-raised-button
    color="primary"
    (click)="save()">

    Save

</button>

</mat-dialog-actions>
